name: Sprint Inquiry Reply

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  sprint-inquiry:
    if: contains(github.event.issue.labels.*.name, 'revenue-protection-sprint') || contains(github.event.issue.labels.*.name, 'service-package-request') || contains(github.event.issue.labels.*.name, 'b2b-business-package')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate sprint inquiry response
        run: python scripts/sprint_inquiry_reply.py "$GITHUB_EVENT_PATH" > sprint_inquiry_comment.md
      - name: Comment on issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --body-file sprint_inquiry_comment.md
