name: Approve B2B Business Package
description: Public-safe written approval for the fixed-scope $3,500 B2B Business Package.
title: "B2B package approval: <organization>"
labels:
  - b2b-business-package
  - b2b-business-package-approval
  - business-inquiry
body:
  - type: markdown
    attributes:
      value: |
        Use this only for public-safe written approval of the $3,500 B2B Business Package.

        Do not post confidential contracts, personal data, private client names, billing details, tax IDs, payment credentials, or unredacted documents.

        Payment-link routing, billing details, and document intake must be coordinated privately after approval.
  - type: input
    id: organization
    attributes:
      label: Organization / team
      placeholder: Example RevOps agency, MSP, implementation partner
    validations:
      required: true
  - type: input
    id: approver_role
    attributes:
      label: Approver role
      placeholder: Founder, finance owner, procurement owner, delivery lead, etc.
    validations:
      required: true
  - type: dropdown
    id: payment_route
    attributes:
      label: Payment/procurement route
      options:
        - Private payment link after approval
        - Procurement approval before payment
        - Vendor setup or purchase order required
        - Funded platform order
    validations:
      required: true
  - type: textarea
    id: approval_text
    attributes:
      label: Approval text
      description: Paste the exact approval sentence below.
      value: Approved. I authorize the $3,500 B2B Business Package and understand this is business-risk review, not legal advice.
    validations:
      required: true
  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Acknowledgement
      options:
        - label: I understand the B2B Business Package is $3,500 fixed scope.
          required: true
        - label: I understand this is business-risk review, not legal advice.
          required: true
        - label: I will not post confidential documents, personal data, private client details, tax IDs, or payment credentials in this public issue.
          required: true
