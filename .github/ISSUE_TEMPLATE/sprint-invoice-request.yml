name: Request Sprint Invoice / Approval Path
description: Start the approval path for the fixed-scope $5,000 Revenue Protection Sprint.
title: "Sprint invoice request: <organization>"
labels:
  - revenue-protection-sprint
  - sprint-invoice-request
  - business-inquiry
body:
  - type: markdown
    attributes:
      value: |
        Use this when your team is ready to route the $5,000 Revenue Protection Sprint for invoice, procurement, or written approval.

        Do not post confidential contracts, personal data, private client names, billing details, tax IDs, or payment credentials in a public issue. Use public-style descriptions only. Private billing and document intake can be coordinated after this request.

        Approval packet: https://lolomix.github.io/contract-revenue-radar/approval-packet.html
  - type: input
    id: organization
    attributes:
      label: Organization / team
      placeholder: Example RevOps agency, MSP, implementation partner
    validations:
      required: true
  - type: input
    id: approver_role
    attributes:
      label: Requester role
      placeholder: Founder, RevOps lead, delivery lead, finance owner, procurement owner, etc.
    validations:
      required: true
  - type: input
    id: document_count
    attributes:
      label: Approximate document/template count
      placeholder: "Example: 15 SOW variants + 5 MSA/order-form templates"
    validations:
      required: true
  - type: textarea
    id: procurement_path
    attributes:
      label: Approval or procurement path
      description: Public-safe summary only. Do not post private billing details or personal data.
      placeholder: "Example: invoice to company role inbox after approval; vendor setup required; purchase order not required."
    validations:
      required: true
  - type: dropdown
    id: preferred_start
    attributes:
      label: Preferred start window
      options:
        - This week
        - Next week
        - Within 30 days
        - Exploring first
    validations:
      required: true
  - type: textarea
    id: delivery_priorities
    attributes:
      label: Delivery priorities
      placeholder: Payment timing, acceptance gates, renewal terms, support scope, service credits, security review, IP ownership, sales/ops playbook, etc.
    validations:
      required: true
  - type: checkboxes
    id: approval_readiness
    attributes:
      label: Approval readiness
      options:
        - label: I understand the Revenue Protection Sprint is $5,000 fixed scope.
          required: true
        - label: I understand this is business-risk review, not legal advice.
          required: true
        - label: I will not post confidential documents, personal data, private client details, tax IDs, or payment credentials in this public issue.
          required: true
        - label: I can approve, route, or introduce the correct person for invoice/procurement approval.
          required: true
        - label: We can provide redacted templates or excerpts through a private intake path after approval.
  - type: textarea
    id: public_notes
    attributes:
      label: Public-safe notes
      description: Optional. Keep this public-safe and non-confidential.
      placeholder: Anything else needed to route the approval, without private documents or personal data.
