openapi: 3.0.3
info:
  title: Revenue Terms Agent Audit API
  version: 0.1.0
  description: >
    Contract Revenue Radar audit tool for Google Cloud Agent Builder.
    The agent sends redacted contract text and receives structured
    revenue-risk findings, fallback positions, and a Markdown report.
servers:
  - url: https://YOUR_CLOUD_RUN_URL
    description: Replace with the deployed Cloud Run service URL.
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Check service health.
      responses:
        "200":
          description: Health response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  version:
                    type: string
  /audit:
    post:
      operationId: auditContractRevenueTerms
      summary: Audit redacted contract text for revenue-risk clauses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditRequest"
      responses:
        "200":
          description: Structured audit response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResponse"
        "400":
          description: Missing or invalid contract text.
components:
  schemas:
    AuditRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Redacted contract, SOW, MSA, order-form, or template excerpt.
        filename:
          type: string
          default: submitted_contract.md
        no_qdrant:
          type: boolean
          default: false
          description: Use deterministic fallback instead of Qdrant local-memory mode.
    AuditResponse:
      type: object
      properties:
        backend:
          type: string
        risk_score:
          type: integer
          minimum: 0
          maximum: 100
        searched_sections:
          type: integer
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        agent_brief:
          $ref: "#/components/schemas/AgentBrief"
        markdown_report:
          type: string
    Finding:
      type: object
      properties:
        risk_type:
          type: string
          enum:
            - payment_delay
            - renewal_loss
            - scope_creep
            - refund_credit
            - data_security
            - ip_ownership
            - renewal_fee_trap
        label:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
        score:
          type: number
        source:
          type: string
        heading:
          type: string
        excerpt:
          type: string
        why:
          type: string
        action:
          type: string
        matched_terms:
          type: array
          items:
            type: string
    AgentBrief:
      type: object
      properties:
        executive_summary:
          type: string
        priority_questions:
          type: array
          items:
            type: string
        fallback_positions:
          type: array
          items:
            type: string
        sales_ops_checklist:
          type: array
          items:
            type: string
